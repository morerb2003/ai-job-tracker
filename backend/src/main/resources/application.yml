server:
  port: 8080

spring:

  profiles:
    active: dev

  application:
    name: jobtracker

  datasource:
    url: jdbc:postgresql://localhost:5432/job_tracker
    username: postgres
    password: More@2525

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
